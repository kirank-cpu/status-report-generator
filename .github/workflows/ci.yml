name: CI

# Run the checks on every push to master and on pull requests targeting it.
# `workflow_dispatch` allows triggering a run manually from the Actions tab.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Only need to read the repo contents to build/test.
permissions:
  contents: read

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint

  build:
    name: Build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Vite production build
        run: npm run build
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  test:
    # node:sqlite (used by the dev/test DB backend) requires Node >= 22.5, so we
    # verify against the minimum-supported 22.x and the current 24.x.
    name: Server tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Jest
        run: npm test
        working-directory: server
